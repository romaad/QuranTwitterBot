name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------ #
  # Lint                                                                 #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # ------------------------------------------------------------------ #
  # Unit tests                                                           #
  # ------------------------------------------------------------------ #
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest -v -m "not integration" \
            --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  # ------------------------------------------------------------------ #
  # Integration tests (live Quran API, mocked X)                        #
  # ------------------------------------------------------------------ #
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    # No fork restriction — integration tests use a local mock server, not live network

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: pytest -v -m integration

  # ------------------------------------------------------------------ #
  # Docker build (verify Dockerfile compiles)                           #
  # ------------------------------------------------------------------ #
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t quran-twitter-bot:ci .
